# Tally — XcodeGen project definition.
#
# Materialize Tally.xcodeproj on a Mac with:
#   brew install xcodegen
#   xcodegen
#
# Then open Tally.xcodeproj in Xcode and set DEVELOPMENT_TEAM in
# Signing & Capabilities. See docs/setup.html for full instructions.

name: Tally

options:
  bundleIdPrefix: app.tally
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Tally:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Tally
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: Tally
        PRODUCT_BUNDLE_IDENTIFIER: app.tally.Tally
        INFOPLIST_FILE: Tally/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tally/Resources/Tally.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        ENABLE_PREVIEWS: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1"
        SUPPORTS_MACCATALYST: NO
